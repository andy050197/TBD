<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineCbba - Cambiar Asiento</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"> <span>Cine</span>Cbba</a>
            </div>
            <nav class="nav">
                <a href="index.html"> Cartelera</a>
                <a href="compra.html"> Comprar Entradas</a>
                <a href="mis-entradas.html"> Mis Entradas</a>
                <a href="cambiar-asiento.html" class="active"> Cambiar Asiento</a>
                <a href="admin.html"> Administración</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1> Cambiar de Asiento</h1>
        
        <div id="alerta-container"></div>
        
        <div class="card">
            <h3>🔍 Buscar mi entrada</h3>
            <div class="form-group">
                <label for="id_entrada">Número de Entrada</label>
                <input type="number" id="id_entrada" placeholder="Ej: 1" required>
            </div>
            <div class="form-group">
                <label for="ci">Cédula de Identidad (CI)</label>
                <input type="text" id="ci" placeholder="Ej: 12345678" required>
            </div>
            <button id="btn-buscar" class="btn btn-primario">🔍 Buscar entrada</button>
        </div>
        
        <div id="info-entrada"></div>
        
        <div id="cambio-container" style="display: none;">
            <div class="card">
                <h3> Selecciona tu nuevo asiento</h3>
                <div id="nuevos-asientos-container">
                    <div class="loading">Cargando asientos disponibles...</div>
                </div>
                <button id="btn-cambiar" class="btn btn-secundario" style="margin-top: 15px; width: 100%;">✅ Confirmar cambio de asiento</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 CineCbba - Todos los derechos reservados</p>
        </div>
    </footer>

    <script src="js/utils.js"></script>
    <script src="js/cambiar-asiento.js"></script>
</body>
</html>
